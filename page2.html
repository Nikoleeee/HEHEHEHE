<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Page 2 ❤️</title>

    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            width: 100%;
            background-image: url('sky-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            background: #fffaf7;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 45px 30px 30px 30px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            z-index: 5;
            position: relative;
        }

        .ribbon-bow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            z-index: 10;
        }

        .knot, .loop-left, .loop-right {
            position: absolute;
        }

        .knot {
            top: 5px;
            left: 31px;
            width: 18px;
            height: 18px;
            background-color: #e5a4b6;
            border-radius: 4px;
        }

        .loop-left, .loop-right {
            top: 0;
            width: 35px;
            height: 26px;
            border: 6px solid #e5a4b6;
            border-radius: 50%;
        }

        .loop-left { left: 4px; transform: rotate(-15deg); }
        .loop-right { right: 4px; transform: rotate(15deg); }

        .cursive-heading {
            font-family: 'Dancing Script', cursive;
            color: #b33b58;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .letter-text {
            font-family: 'Poppins', sans-serif;
            color: #594549;
            font-size: 0.88rem;
            line-height: 1.7;
            text-align: left;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        /* LOVE GAME */
        .game-box {
            background: rgba(255, 245, 247, 0.7);
            border: 2px dashed #e5a4b6;
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }

        .game-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            color: #7a6267;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #eee5e7;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e5a4b6, #e07b93);
            transition: width 0.2s ease;
        }

        .click-target {
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            margin: 10px 0;
        }

        .counter-status {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: #7a6267;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="ribbon-bow">
        <div class="loop-left"></div>
        <div class="loop-right"></div>
        <div class="knot"></div>
    </div>

    <h1 class="cursive-heading">My Letter For You... ✨</h1>

    <p class="letter-text">
To my favorite person, Happy 33rd monthsary! Thank you for being my safe space, my happiness, and my peace. I love you so much 💕
    </p>

    <!-- LOVE METER (RESTORED) -->
    <div class="game-box" id="gameArea">
        <div class="game-title" id="gameHeader">
            SPAM FOR 33 MONTHS IF U LOVE ME 💛❤️
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="loveFill"></div>
        </div>

        <div class="click-target" id="heartTarget">🐶❤️</div>

        <div class="counter-status" id="clickCount">
            Clicks needed: 33
        </div>
    </div>

</div>

<script>
    let clicks = 0;
    const totalNeeded = 33;

    const heart = document.getElementById('heartTarget');
    const fill = document.getElementById('loveFill');
    const text = document.getElementById('clickCount');
    const header = document.getElementById('gameHeader');
    const gameArea = document.getElementById('gameArea');

    heart.addEventListener('click', function(e) {
        if (clicks < totalNeeded) {
            clicks++;

            let percentage = (clicks / totalNeeded) * 100;
            fill.style.width = percentage + '%';

            text.innerText = `Clicks needed: ${totalNeeded - clicks}`;

            if (clicks === totalNeeded) {
                header.innerHTML = "LOVE FULLY LOADED! 🎉";
                text.innerText = "YAY! UNLOCKED!";
                heart.style.display = "none";
            }
        }
    });
</script>

</body>
</html>
