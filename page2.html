<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story - Page 2 ❤️</title>

<link href="https://googleapis.com" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    width: 100%;
    background-image: url('sky-bg.jpg') !important;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
    position: relative;
    z-index: 1;
}

/* ENVELOPE */
.envelope-wrapper {
    position: relative;
    width: 300px;
    height: 200px;
    background-color: #fce4ec;
    border-radius: 12px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.15);
    cursor: pointer;
}

/* MODAL */
.modal-overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal-box {
    background:#fffaf7;
    padding:25px;
    border-radius:16px;
    text-align:center;
}

/* MUSIC */
.music-player {
    display:none;
    position: fixed;
    top: 15px;
    right: 15px;
    background: #fff;
    padding: 10px;
    border-radius: 20px;
    z-index: 90;
}

/* WORKSPACE */
.main-workspace {
    display:none;
    flex-direction: row;
    gap: 30px;
}

/* LETTER */
.container {
    background:#fffaf7;
    padding:40px;
    border-radius:20px;
    max-width:440px;
    text-align:center;
}

/* LOVE GAME */
.game-box {
    background: rgba(255,245,247,0.7);
    border: 2px dashed #e5a4b6;
    padding:20px;
    border-radius:16px;
}

.progress-bar {
    width:100%;
    height:12px;
    background:#eee5e7;
    border-radius:10px;
    overflow:hidden;
}

.progress-fill {
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#e5a4b6,#e07b93);
}

.click-target {
    font-size:3rem;
    cursor:pointer;
}

.burst-heart-particle {
    position:absolute;
    animation: float 0.6s ease forwards;
}

@keyframes float {
    0% { transform:scale(0.3); opacity:1; }
    100% { transform:translateY(-100px); opacity:0; }
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelope" class="envelope-wrapper"></div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
    <div class="modal-box">
        <h2>Reminder 💖</h2>
        <button id="modalCloseBtn">Open</button>
    </div>
</div>

<!-- MUSIC -->
<div id="playerWidget" class="music-player">
    <button id="playBtn">▶</button>
    <span id="trackStatus">Paused</span>
</div>

<audio id="loveSong" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<!-- WORKSPACE -->
<div id="workspace" class="main-workspace">

    <!-- LETTER -->
    <div class="container">

        <h1>My Letter For You... ✨</h1>

        <p>
To my favorite person, Happy 33rd monthsary! I love you 💕
        </p>

        <!-- LOVE METER -->
        <div class="game-box" id="gameArea">

            <div id="gameHeader">SPAM FOR 33 MONTHS 💛❤️</div>

            <div class="progress-bar">
                <div class="progress-fill" id="loveFill"></div>
            </div>

            <div class="click-target" id="heartTarget">❤️</div>

            <div id="clickCount">Clicks needed: 33</div>

        </div>

    </div>
</div>

<script>

let clicks = 0;
const totalNeeded = 33;

const envelope = document.getElementById("envelope");
const modal = document.getElementById("modal");
const modalCloseBtn = document.getElementById("modalCloseBtn");

const workspace = document.getElementById("workspace");
const playerWidget = document.getElementById("playerWidget");

const song = document.getElementById("loveSong");
const playBtn = document.getElementById("playBtn");
const trackStatus = document.getElementById("trackStatus");

const heart = document.getElementById("heartTarget");
const fill = document.getElementById("loveFill");
const text = document.getElementById("clickCount");
const gameArea = document.getElementById("gameArea");

/* ENVELOPE OPEN */
envelope.addEventListener("click", function () {
    modal.style.display = "flex";
});

/* MODAL OPEN WORKSPACE */
modalCloseBtn.addEventListener("click", function () {
    modal.style.display = "none";
    playerWidget.style.display = "flex";
    workspace.style.display = "flex";
});

/* MUSIC */
playBtn.addEventListener("click", function () {
    if (song.paused) {
        song.play();
        playBtn.innerText = "⏸";
        trackStatus.innerText = "Playing";
    } else {
        song.pause();
        playBtn.innerText = "▶";
        trackStatus.innerText = "Paused";
    }
});

/* LOVE METER */
heart.addEventListener("click", function (e) {
    if (clicks < totalNeeded) {
        clicks++;

        fill.style.width = (clicks / totalNeeded) * 100 + "%";
        text.innerText = "Clicks needed: " + (totalNeeded - clicks);

        for (let i = 0; i < 5; i++) {
            const particle = document.createElement("div");
            particle.classList.add("burst-heart-particle");
            particle.innerText = Math.random() > 0.5 ? "❤️" : "💛";

            const rect = gameArea.getBoundingClientRect();
            particle.style.left = (e.clientX - rect.left) + "px";
            particle.style.top = (e.clientY - rect.top) + "px";

            gameArea.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }
    }
});

</script>

</body>
</html>
