<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story - Page 2 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    width: 100%;
    background-image: url('sky-bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
    overflow-x: hidden;
}

/* HEART BG */
.heart-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 0;
    pointer-events: none;
}

.roaming-heart {
    position: absolute;
    bottom: -10%;
    font-size: 32px;
    animation: scrollHeartsUp linear infinite;
}

@keyframes scrollHeartsUp {
    0% { transform: translateY(0); opacity: 0; }
    100% { transform: translateY(-115vh); opacity: 0; }
}

/* ENVELOPE */
.envelope-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.envelope-card {
    font-size: 7rem;
    background: #fffaf7;
    padding: 40px 50px;
    border-radius: 30px;
    text-align: center;
    cursor: pointer;
    animation: floatEnvelope 2s ease-in-out infinite;
}

.envelope-text {
    font-size: 1.2rem;
    font-family: 'Poppins', sans-serif;
    color: #7a6267;
}

@keyframes floatEnvelope {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.crack {
    animation: crackOpen 0.6s forwards;
}

@keyframes crackOpen {
    0% { transform: scale(1) rotate(0); }
    100% { transform: scale(0) rotate(-10deg); opacity: 0; }
}

/* LETTER — FIXED NO BLOCKING */
#letter {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1;        /* 🔥 VERY LOW */
    pointer-events: none;
}

#letter.show {
    display: flex;
    pointer-events: none; /* 🔥 IMPORTANT: NEVER BLOCK GAME */
}

.letter-card {
    background:#fffaf7;
    padding:40px;
    border-radius:20px;
    max-width:400px;
    text-align:center;
    pointer-events: none; /* 🔥 NO BLOCK */
}

/* MAIN */
.container {
    background: #fffaf7;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 45px 30px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 2;
}

/* GAME */
.game-box {
    background: rgba(255, 245, 247, 0.7);
    border: 2px dashed #e5a4b6;
    border-radius: 16px;
    padding: 20px;
    margin-top: 25px;
}

.progress-bar {
    width: 100%;
    background: #eee5e7;
    height: 12px;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #e5a4b6, #e07b93);
    transition: width 0.1s ease;
}

.click-target {
    font-size: 5rem;
    cursor: pointer;
}

.burst-heart-particle {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    animation: shootOutAndFade 0.6s ease-out forwards;
}

@keyframes shootOutAndFade {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.1) rotate(var(--r)); opacity: 0; }
}
</style>
</head>

<body>

<!-- HEART BG -->
<div class="heart-bg">
    <div class="roaming-heart" style="left: 3%; animation-duration: 6s;">💛</div>
    <div class="roaming-heart" style="left: 8%; animation-duration: 9s;">❤️</div>
</div>

<!-- ENVELOPE -->
<div id="envelopeOverlay" class="envelope-overlay">
    <div class="envelope-card" id="openEnvelope">
        💌
        <div class="envelope-text">Click to Open</div>
    </div>
</div>

<!-- LETTER -->
<div id="letter">
    <div class="letter-card">
        <h1>My Love 💛</h1>
        <p>Your message here...</p>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <h1>My Letter For You... ✨</h1>
    <p>Happy 33rd monthsary 💕</p>

    <!-- LOVE GAME (UNCHANGED) -->
    <div class="game-box" id="gameArea">
        <div id="gameHeader">SPAM FOR 33 MONTHS IF U LOVE ME 💛❤️</div>

        <div class="progress-bar">
            <div class="progress-fill" id="loveFill"></div>
        </div>

        <div class="click-target" id="heartTarget">❤️</div>
        <div id="clickCount"></div>
    </div>

</div>

<audio id="bgMusic" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>

let clicks = 0;
const totalNeeded = 33;

const heart = document.getElementById("heartTarget");
const fill = document.getElementById("loveFill");
const text = document.getElementById("clickCount");
const header = document.getElementById("gameHeader");
const gameArea = document.getElementById("gameArea");

heart.addEventListener("click", function(e) {
    if (clicks < totalNeeded) {
        clicks++;

        fill.style.width = (clicks / totalNeeded) * 100 + "%";
        text.innerText = "Clicks needed: " + (totalNeeded - clicks);

        for (let i = 0; i < 5; i++) {
            const particle = document.createElement("div");
            particle.classList.add("burst-heart-particle");
            particle.innerText = Math.random() > 0.5 ? "❤️" : "💛";

            const rect = gameArea.getBoundingClientRect();
            particle.style.left = (e.clientX - rect.left) + "px";
            particle.style.top = (e.clientY - rect.top) + "px";

            particle.style.setProperty("--x", ((Math.random() - 0.5) * 160) + "px");
            particle.style.setProperty("--y", ((Math.random() - 0.5) * 160) + "px");
            particle.style.setProperty("--r", (Math.random() * 360) + "deg");

            gameArea.appendChild(particle);
            setTimeout(() => particle.remove(), 600);
        }

        if (clicks === totalNeeded) {
            header.innerHTML = "LOVE FULLY LOADED! 🎉 I LOVE YOU!";
            text.innerText = "YAY!";
            heart.style.display = "none";
        }
    }
});

/* ENVELOPE */
const envelope = document.getElementById("openEnvelope");
const overlay = document.getElementById("envelopeOverlay");
const letter = document.getElementById("letter");
const music = document.getElementById("bgMusic");

envelope.addEventListener("click", function () {
    envelope.classList.add("crack");

    setTimeout(() => {
        overlay.style.display = "none";
        letter.classList.add("show");
        music.play().catch(() => {});
    }, 600);
});

</script>

</body>
</html>
